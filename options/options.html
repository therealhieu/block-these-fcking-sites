<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blockthesefckingsites — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>

  <header class="page-header">
    <div class="page-header-left">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
      <span class="page-header-title">blockthesefckingsites — Settings</span>
    </div>
    <span class="page-header-version" id="ext-version"></span>
  </header>

  <main class="page-body" id="app">

    <!-- ── PROFILE ── -->
    <section class="section" aria-labelledby="label-profile">
      <div class="section-label" id="label-profile">Profile</div>
      <div class="section-card">
        <div class="section-inner">
          <div class="profile-row">
            <input type="text" id="profile-name-input" aria-label="Profile name" maxlength="40" />
            <button class="btn btn-outline" id="btn-rename">Rename</button>
            <button class="btn btn-primary" id="btn-new-profile">New Profile</button>
            <button class="btn-danger-text" id="btn-delete">Delete</button>
          </div>
          <div class="chip-row" id="chip-row" role="list" aria-label="Profiles"></div>
          <p class="field-error hidden" id="profile-error"></p>
        </div>
      </div>
    </section>

    <!-- ── BLOCKED SITES ── -->
    <section class="section" aria-labelledby="label-sites">
      <div class="section-label" id="label-sites">Blocked Sites</div>
      <div class="section-card">
        <div class="section-inner">
          <div class="add-row">
            <input type="text" id="add-domain" placeholder="e.g. facebook, reddit, youtube.com"
                   aria-label="Domain to block" />
            <button class="btn btn-primary" id="btn-add-site">Add</button>
          </div>
          <p class="field-error hidden" id="site-error"></p>
          <div id="site-list"></div>
          <p class="sites-note">
            Remove is only available outside the active schedule window.<br>
            Visit the blocked site and complete the typing challenge to remove it.
          </p>
        </div>
      </div>
    </section>

    <!-- ── SCHEDULE ── -->
    <section class="section" aria-labelledby="label-schedule">
      <div class="section-label" id="label-schedule">Schedule</div>
      <div class="section-card">
        <div class="section-inner">
          <div class="schedule-row">
            <span class="schedule-label" id="schedule-toggle-label">Limit blocking to specific hours</span>
            <label class="toggle" for="schedule-enabled">
              <input type="checkbox" id="schedule-enabled" aria-labelledby="schedule-toggle-label" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div id="schedule-config">
            <div class="days-row" id="days-row" role="group" aria-label="Days of week"></div>
            <div class="time-row">
              <label for="time-start">From</label>
              <input type="time" id="time-start" aria-label="Start time" />
              <label for="time-end">To</label>
              <input type="time" id="time-end" aria-label="End time" />
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="page-footer">
    Made with ♥ for Quyen &nbsp;·&nbsp;
    by <a href="https://github.com/therealhieu" target="_blank" rel="noopener">therealhieu</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/therealhieu/block-these-fcking-sites" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="options.js" type="module"></script>
</body>
</html>
